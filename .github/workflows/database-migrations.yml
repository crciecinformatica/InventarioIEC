name: Database Migrations

on:
  pull_request:
    paths:
      - 'prisma/schema.prisma'
      - 'supabase/migrations/**'
      - 'scripts/db-*.js'
      - 'scripts/check-migrations.js'
      - 'package.json'
      - 'package-lock.json'
  push:
    branches: [main]
    paths:
      - 'prisma/schema.prisma'
      - 'supabase/migrations/**'
      - 'scripts/db-*.js'
      - 'scripts/check-migrations.js'
      - 'package.json'
      - 'package-lock.json'

permissions:
  contents: read

jobs:
  validate:
    name: Validate migrations
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: inventarioiec_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/inventarioiec_ci
      LOCAL_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/inventarioiec_ci

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate migration files and Prisma schema
        run: npm run db:validate

      - name: Apply migrations to disposable PostgreSQL
        run: npm run db:apply:local

      - name: Ensure migrated database matches Prisma schema
        run: |
          npm run --silent db:diff:local > /tmp/schema-diff.sql
          if [ -s /tmp/schema-diff.sql ]; then
            cat /tmp/schema-diff.sql
            exit 1
          fi

  deploy-production:
    name: Apply migrations to Supabase production
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production-database

    steps:
      - uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Apply SQL migrations to Supabase
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
        run: |
          test -n "$DATABASE_URL"
          node scripts/db-apply-pending.js
